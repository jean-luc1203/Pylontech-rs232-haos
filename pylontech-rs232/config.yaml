name: "Pylontech RS232 HAOS"
version: "1.0.5"
slug: pylontech_rs232_haos
description: "Node-RED Pylontech plug & play: flow mis à jour via MAJ add-on"

url: "https://github.com/jean-luc1203/Pylontech-rs232-haos"

arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

startup: services
boot: auto
init: false
uart: true
homeassistant_api: true

map:
  - type: addon_config
    read_only: false
  - type: homeassistant_config
    read_only: false
  - type: share
    read_only: false

ports:
  1893/tcp: 1893

ports_description:
  1893/tcp: "Node-RED web interface"

panel_icon: mdi:battery-high

options:
  # ============================================================
  # 🔌 TRANSPORT
  # ============================================================
  link: "serial"
  serial_port: "/dev/serial/by-id/CHANGE-ME"
  gateway_host: ""
  gateway_port: 8899

  # ============================================================
  # 📡 MQTT CONFIGURATION
  # ============================================================
  mqtt_section: "────────── MQTT CONFIGURATION ──────────"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  mqtt_base_topic: "pylontech1"
  mqtt_client_id: "nodered_pylontech"

  # ============================================================
  # 👑 PREMIUM
  # ============================================================
  premium_section: "────────── PREMIUM ──────────"
  premium_key: ""

  # ============================================================
  # 🎨 DASHBOARD
  # ============================================================
  dashboard_section: "────────── DASHBOARD ──────────"
  dashboard_custom_cards_installed: false
  dashboard_language: "fr"

  # ============================================================
  # 🔔 OPTIONS
  # ============================================================
  send_bip: true
  communication_debug: false

  # ============================================================
  # 🌍 TIMEZONE
  # ============================================================
  timezone_section: "────────── TIMEZONE ──────────"
  timezone_mode: "Europe/Paris"
  timezone_custom: "UTC"

schema:
  link: list(serial|gateway)
  serial_port: str?
  gateway_host: str?
  gateway_port: int?

  mqtt_section: str?
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: password
  mqtt_base_topic: str
  mqtt_client_id: str

  premium_section: str?
  premium_key: str?

  dashboard_section: str?
  dashboard_custom_cards_installed: bool
  dashboard_language: list(fr|en)

  send_bip: bool
  communication_debug: bool

  timezone_section: str?
  timezone_mode: list(Europe/Paris|Europe/Berlin|Europe/Brussels|Europe/Madrid|Europe/Rome|Europe/London|America/New_York|America/Chicago|America/Los_Angeles|America/Montreal|Asia/Dubai|Asia/Tokyo|Australia/Sydney|CUSTOM)
  timezone_custom: str?
